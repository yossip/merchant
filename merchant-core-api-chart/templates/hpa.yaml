{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "merchant-core-api-chart.fullname" . }}
  labels:
    {{- include "merchant-core-api-chart.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "merchant-core-api-chart.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if and .Values.autoscaling.datadogMetric.enabled .Values.autoscaling.datadogMetric.targetValue }}
    - type: External
      external:
        metric:
          name: datadogmetric@default:{{ include "merchant-core-api-chart.fullname" . }}-latency
        target:
          type: AverageValue
          value: {{ .Values.autoscaling.datadogMetric.targetValue | quote }}
    {{- else }}
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- end }}
{{- end }}
