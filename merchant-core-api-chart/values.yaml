# Merchant Core API - Values
# Inherits templates from the DevOps-managed base chart (charts/devops-base-chart/).
# All values must be defined here since Helm library charts do not auto-surface
# their values.yaml to consuming charts. The library provides the TEMPLATES;
# this file provides the VALUES.

# --------------------------------------------------------------------------
# Replica Configuration
# --------------------------------------------------------------------------
replicaCount: 3

# --------------------------------------------------------------------------
# Container Image
# --------------------------------------------------------------------------
image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --------------------------------------------------------------------------
# Service Account
# --------------------------------------------------------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# --------------------------------------------------------------------------
# Pod Metadata
# --------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# --------------------------------------------------------------------------
# Service
# --------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80

# --------------------------------------------------------------------------
# Ingress
# --------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# --------------------------------------------------------------------------
# HTTPRoute (Gateway API)
# --------------------------------------------------------------------------
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

# --------------------------------------------------------------------------
# Resources
# --------------------------------------------------------------------------
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --------------------------------------------------------------------------
# Probes
# --------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# --------------------------------------------------------------------------
# Autoscaling
# --------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
  
  datadogMetric:
    enabled: false
    query: "avg:trace.rack.request.duration.by.service.99p{env:production,service:merchant-core-api}"
    targetValue: "100m"

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes: []
volumeMounts: []

# --------------------------------------------------------------------------
# Scheduling
# --------------------------------------------------------------------------
nodeSelector: {}
tolerations: []

# Merchant-specific pod anti-affinity for HA across AZs and nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - merchant-core-api-chart
        topologyKey: topology.kubernetes.io/zone
    - weight: 50
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - merchant-core-api-chart
        topologyKey: kubernetes.io/hostname

# --------------------------------------------------------------------------
# RBAC - defines what the pod's service account can and cannot do
# --------------------------------------------------------------------------
rbac:
  # Set to true to create a Role and RoleBinding for the service account
  create: true
  # rules define the allowed API permissions (least-privilege by default)
  rules:
    - apiGroups: [""]
      resources: ["configmaps", "secrets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["create"]
